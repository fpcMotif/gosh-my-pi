name: Droid Auto Review

on:
   pull_request:
      types: [opened, ready_for_review, reopened]

concurrency:
   group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
   cancel-in-progress: true

jobs:
   droid-review:
      if: github.event.pull_request.draft == false
      runs-on: ubuntu-latest
      permissions:
         contents: write
         pull-requests: write
         issues: write
         id-token: write
         actions: read
      env:
         HAS_FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY != '' }}
      steps:
         - name: Skip notice (FACTORY_API_KEY not configured)
           if: env.HAS_FACTORY_API_KEY != 'true'
           run: |
              echo "::notice::FACTORY_API_KEY secret is not configured; skipping Droid auto review. Job will report success."
         - name: Checkout repository
           if: env.HAS_FACTORY_API_KEY == 'true'
           uses: actions/checkout@v5
           with:
              fetch-depth: 1
         - name: Run Droid Auto Review
           if: env.HAS_FACTORY_API_KEY == 'true'
           uses: Factory-AI/droid-action@main
           with:
              factory_api_key: ${{ secrets.FACTORY_API_KEY }}
              automatic_review: true
              automatic_security_review: true
